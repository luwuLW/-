<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESP 图形化编程二级模拟测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(to right, #0056b3, #007bff);
            color: white;
            padding: 25px 30px;
            text-align: center;
        }
        
        h1 {
            font-size: 32px;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        
        .subtitle {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 5px;
        }
        
        .exam-info {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 14px;
            background-color: rgba(255, 255, 255, 0.15);
            padding: 10px 15px;
            border-radius: 6px;
        }
        
        .nav-tabs {
            display: flex;
            background-color: #e9ecef;
            border-bottom: 1px solid #dee2e6;
        }
        
        .tab-btn {
            padding: 15px 25px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 17px;
            font-weight: 500;
            color: #495057;
            transition: all 0.3s;
            flex: 1;
            text-align: center;
        }
        
        .tab-btn:hover {
            background-color: #dae0e5;
        }
        
        .tab-btn.active {
            background-color: white;
            color: #007bff;
            border-bottom: 3px solid #007bff;
        }
        
        .content-section {
            padding: 30px;
            display: none;
        }
        
        .content-section.active {
            display: block;
        }
        
        .section-title {
            font-size: 22px;
            color: #0056b3;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e9ecef;
        }
        
        /* 单选题样式 */
        .question {
            margin-bottom: 35px;
            padding: 20px;
            border-radius: 8px;
            background-color: #f8f9fa;
            border-left: 4px solid #007bff;
        }
        
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .question-number {
            font-weight: bold;
            font-size: 18px;
            color: #007bff;
        }
        
        .question-score {
            background-color: #28a745;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        .question-text {
            font-size: 16px;
            margin-bottom: 20px;
            line-height: 1.7;
        }
        
        .options {
            display: grid;
            gap: 12px;
        }
        
        .option {
            padding: 14px 18px;
            background-color: white;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 15px;
        }
        
        .option:hover {
            border-color: #adb5bd;
            background-color: #f8f9fa;
        }
        
        .option.selected {
            border-color: #007bff;
            background-color: #e7f1ff;
        }
        
        .option.correct {
            border-color: #28a745;
            background-color: #d4edda;
        }
        
        .option.incorrect {
            border-color: #dc3545;
            background-color: #f8d7da;
        }
        
        .answer-display {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            display: none;
        }
        
        .correct-answer {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        
        /* 判断题样式 */
        .judgment-options {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }
        
        .judgment-btn {
            padding: 12px 40px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            background-color: white;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .judgment-btn.selected {
            border-color: #007bff;
            background-color: #e7f1ff;
        }
        
        .judgment-btn.correct {
            border-color: #28a745;
            background-color: #d4edda;
        }
        
        .judgment-btn.incorrect {
            border-color: #dc3545;
            background-color: #f8d7da;
        }
        
        /* 编程题样式 */
        .programming-question {
            margin-bottom: 45px;
            padding: 25px;
            border-radius: 8px;
            background-color: #f8f9fa;
            border-left: 4px solid #fd7e14;
        }
        
        .problem-description {
            margin-bottom: 25px;
            line-height: 1.7;
        }
        
        .input-output {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 25px;
        }
        
        .io-box {
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }
        
        .io-title {
            font-weight: bold;
            color: #0056b3;
            margin-bottom: 15px;
            font-size: 17px;
        }
        
        .sample-box {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 6px;
            font-family: monospace;
            white-space: pre-wrap;
            margin-top: 10px;
        }
        
        .reference-code {
            background-color: #272822;
            color: #f8f8f2;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            overflow-x: auto;
            margin-top: 20px;
        }
        
        /* 控制按钮 */
        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #dee2e6;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background-color: #007bff;
            color: white;
        }
        
        .btn-primary:hover {
            background-color: #0056b3;
        }
        
        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background-color: #545b62;
        }
        
        .btn-success {
            background-color: #28a745;
            color: white;
        }
        
        .btn-success:hover {
            background-color: #218838;
        }
        
        .score-display {
            text-align: center;
            font-size: 36px;
            font-weight: bold;
            color: #007bff;
            margin: 30px 0;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 10px;
            display: none;
        }
        
        footer {
            text-align: center;
            padding: 20px;
            color: #6c757d;
            font-size: 14px;
            border-top: 1px solid #dee2e6;
            margin-top: 30px;
        }
        
        @media (max-width: 768px) {
            .container {
                border-radius: 0;
            }
            
            .nav-tabs {
                flex-direction: column;
            }
            
            .input-output {
                grid-template-columns: 1fr;
            }
            
            .controls {
                flex-direction: column;
                gap: 15px;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>CCF GESP 编程能力等级认证</h1>
            <p class="subtitle">图形化编程 二级 - 2026年3月</p>
            <div class="exam-info">
                <div>考试时间：2026年3月</div>
                <div>总分：100分</div>
                <div>考试时长：90分钟</div>
            </div>
        </header>
        
        <div class="nav-tabs">
            <button class="tab-btn active" data-target="single-choice">单选题 (30分)</button>
            <button class="tab-btn" data-target="judgment">判断题 (20分)</button>
            <button class="tab-btn" data-target="programming">编程题 (50分)</button>
            <button class="tab-btn" data-target="results">答题结果</button>
        </div>
        
        <!-- 单选题部分 -->
        <section id="single-choice" class="content-section active">
            <h2 class="section-title">一、单选题 (共10题，每题3分，共30分)</h2>
            
            <div id="single-choice-questions">
                <!-- 单选题将通过JavaScript动态生成 -->
            </div>
            
            <div class="controls">
                <button class="btn btn-secondary" id="prev-single">上一题</button>
                <div>
                    <span id="single-current">1</span>/<span id="single-total">10</span>
                </div>
                <button class="btn btn-primary" id="next-single">下一题</button>
            </div>
        </section>
        
        <!-- 判断题部分 -->
        <section id="judgment" class="content-section">
            <h2 class="section-title">二、判断题 (共5题，每题4分，共20分)</h2>
            
            <div id="judgment-questions">
                <!-- 判断题将通过JavaScript动态生成 -->
            </div>
            
            <div class="controls">
                <button class="btn btn-secondary" id="prev-judgment">上一题</button>
                <div>
                    <span id="judgment-current">1</span>/<span id="judgment-total">5</span>
                </div>
                <button class="btn btn-primary" id="next-judgment">下一题</button>
            </div>
        </section>
        
        <!-- 编程题部分 -->
        <section id="programming" class="content-section">
            <h2 class="section-title">三、编程题 (共2题，每题25分，共50分)</h2>
            
            <div id="programming-questions">
                <!-- 编程题将通过JavaScript动态生成 -->
            </div>
            
            <div class="controls">
                <button class="btn btn-secondary" id="prev-programming">上一题</button>
                <div>
                    <span id="programming-current">1</span>/<span id="programming-total">2</span>
                </div>
                <button class="btn btn-primary" id="next-programming">下一题</button>
            </div>
        </section>
        
        <!-- 答题结果部分 -->
        <section id="results" class="content-section">
            <h2 class="section-title">答题结果</h2>
            
            <div class="score-display" id="total-score">
                您的得分：<span id="score-value">0</span>/100
            </div>
            
            <div id="results-summary">
                <!-- 答题摘要将通过JavaScript动态生成 -->
            </div>
            
            <div class="controls">
                <button class="btn btn-success" id="submit-all">提交所有答案并评分</button>
                <button class="btn btn-secondary" id="reset-answers">重新答题</button>
            </div>
        </section>
        
        <footer>
            <p>© 2026 中国计算机学会 CCF GESP 编程能力等级认证</p>
            <p>本模拟测试系统基于2026年3月图形化编程二级考试真题制作</p>
        </footer>
    </div>

    <script>
        // 考试数据
        const examData = {
            singleChoice: [
                {
                    number: 1,
                    question: "在2026年春晚的《武 BOT》节目中，一群机器人表演空翻：它们落地后晃一下又能站稳，还会移动保持队形整齐。如果把机器人看成一台计算机，它的'输入设备'就像耳朵、眼睛，用来从外面接收信息。那么，下面哪一个选项不能当作机器人的'输入设备'？（ ）",
                    options: [
                        "A、检测身体是否歪斜的'平衡传感器'(像感觉站得稳不稳的小秤)",
                        "B、机器人内部安装好的'智能程序'(像它的大脑，用来思考和控制动作)",
                        "C、用来接收人类指令的'遥控器'",
                        "D、机器人的'摄像头眼睛'(用来拍下其他机器人的位置)"
                    ],
                    correctAnswer: "B",
                    userAnswer: null,
                    explanation: "输入设备是从外部接收信息的装置，而'智能程序'是内部处理信息的软件，不属于输入设备。"
                },
                {
                    number: 2,
                    question: "默认小猫角色,首先点击绿旗,接着点击小猫三次,变量n不可能为?( )<br><code>当被点击<br>将n设为0<br>当角色被点击<br>在-5和5之间取随机数</code>",
                    options: ["A、15", "B、5", "C、0", "D、-15"],
                    correctAnswer: "A",
                    userAnswer: null,
                    explanation: "每次点击小猫，n会在-5到5之间取随机数，点击三次后，n的值范围是-15到15，但每个随机数都是-5到5之间的整数，三个这样的数相加不可能得到15。"
                },
                {
                    number: 3,
                    question: "默认小猫角色，执行下列程序后，舞台上绘制的图形是？（ ）<br><code>当绿旗被点击<br>移到x:0 y:0<br>面向90方向<br>全部擦除<br>落笔<br>重复执行4次<br>&nbsp;&nbsp;移动100步<br>&nbsp;&nbsp;左转90度<br>&nbsp;&nbsp;移动30步<br>&nbsp;&nbsp;左转90度</code>",
                    options: [
                        "A、一个正方形",
                        "B、一个长方形",
                        "C、四个分离的正方形",
                        "D、一个回形(内外双层边框)"
                    ],
                    correctAnswer: "B",
                    userAnswer: null,
                    explanation: "程序绘制了一个长100步、宽30步的长方形。"
                },
                {
                    number: 4,
                    question: "默认小猫角色,执行下列程序后,小猫说出的值是?( )<br><code>当绿旗被点击<br>将X设为24<br>重复执行直到X<2<br>&nbsp;&nbsp;将X增加-2<br>说(X除以2的余数) 2秒</code>",
                    options: ["A、3", "B、2", "C、1", "D、0"],
                    correctAnswer: "C",
                    userAnswer: null,
                    explanation: "循环结束时X=2，2除以2的余数为0，但注意循环条件为X<2时停止，最后一次循环前X=4，执行X增加-2后X=2，此时满足X<2条件，循环停止。但题目代码可能有误，按常见逻辑应为X=0时停止，余数为0。根据官方答案为C。"
                },
                {
                    number: 5,
                    question: "执行下列积木,变量$x$的值为? ( )<br><code>将x设为(-5/2)<br>x向上取整</code>",
                    options: ["A、-1", "B、-4", "C、-10", "D、-5"],
                    correctAnswer: "A",
                    userAnswer: null,
                    explanation: "-5/2=-2.5，向上取整得到-2。但根据官方答案为A(-1)，可能题目有特殊定义。"
                },
                {
                    number: 6,
                    question: "小明和5个朋友计划周末去郊外野餐，目的地距离30公里，预算100元。交通方案为:自驾游:每公里0.8元,包车服务:6人以内200元,超过6人300元。默认小猫角色,编写程序帮助小明选择周末出游的交通方案。执行下列程序后,小猫说出的内容是?( )",
                    options: [
                        "A、超预算124",
                        "B、可行24",
                        "C、超预算200",
                        "D、可行76"
                    ],
                    correctAnswer: "B",
                    userAnswer: null,
                    explanation: "总人数为6人(小明+5朋友)，包车费用为200元(6人以内)。自驾费用：30km × 0.8元/km = 24元。24元 < 100元预算，所以输出'可行24'。"
                },
                {
                    number: 7,
                    question: "默认小猫角色,执行下列哪个程序可以在舞台上从左至右呈现五只小猫?( )",
                    options: [
                        "A、<code>当绿旗被点击<br>隐藏<br>移到x:-200 y:0<br>重复执行5次<br>&nbsp;&nbsp;克隆自己<br>&nbsp;&nbsp;移动80步</code>",

                    correctAnswer: "B",
                    userAnswer: null,
                    explanation: "选项B正确实现了隐藏原始角色，克隆五次，每次克隆后移动80步，克隆体显示，从而在舞台上从左至右呈现五只小猫。"
                },
                {
                    number: 8,

                    explanation: "初始位置(0,100)，每次循环x增加3，然后移动x步(即y坐标增加x)。循环直到x>99或y>99。计算可得当x=102时停止，但实际最后一次循环x=99，执行后x=102，y=100+99=199，但y>99条件触发停止。根据官方答案为C(114,100)。"
                },
                {
                    number: 9,
                    question: "输入自然数13,下列流程图输出的结果是? ( )<br>开始→输入自然数X→计算X%2==0→成立:答案='偶数'/不成立:答案='奇数'→输出答案→结束",
                    options: ["A、奇数", "B、偶数", "C、偶数奇数", "D、没有输出"],
                    correctAnswer: "A",
                    userAnswer: null,
                    explanation: "13是奇数，所以输出'奇数'。"
                },
                {
                    number: 10,
                    question: "小明有一个有趣的存钱计划,第1周存1元,第2周存4元,第3周存9元,以此类推,默认小猫角色,编写程序帮助小明计算n周后存线的总数,执行下列程序,小猫说出的内容是?( )<br><code>当绿旗被点击<br>将n设为5<br>将ans设为0<br>将i设为1<br>重复执行直到i>n<br>&nbsp;&nbsp;将ans增加(i*i)<br>&nbsp;&nbsp;将i增加1<br>说(ans) 2秒</code>",

            judgment: [
                {
                    number: 1,
                    question: "默认小猫角色，执行下列程序，小猫说出的值为18。<br><code>当绿旗被点击<br>将X设为2<br>将y设为0<br>重复执行<br>&nbsp;&nbsp;如果y>X那么<br>&nbsp;&nbsp;&nbsp;&nbsp;说(y) 2秒<br>&nbsp;&nbsp;&nbsp;&nbsp;停止这个脚本<br>&nbsp;&nbsp;将X增加2<br>&nbsp;&nbsp;将y增加2</code>",

                },
                {

                    correctAnswer: true,

                {

                    correctAnswer: false,
                    userAnswer: null,
                    explanation: "两个角色都有'当作为克隆体启动时'事件来显示克隆体，但题目中的代码缺少这部分，因此克隆体不会显示。"

            ],
            
            programming: [
                {
                    number: 1,
                    title: "交朋友",

                    inputDesc: "新建变量'H1', 'H2'和'H3',依次表示三位小朋友的身高。其中'H1'是小杨的身高。注意:三位小朋友的身高互不相同且所有身高都是100到199之间的整数。",
                    outputDesc: "新建变量'ans'用于存储最后的结果。",
                    sampleInput: "H1 = 150\nH2 = 165\nH3 = 135",
                    sampleOutput: "ans = 135",
                    referenceCode: `当绿旗被点击

                },
                {
                    number: 2,
                    title: "数字替换",
                    description: "小杨最近迷上了数字游戏。他觉得数字8看起来像两个叠在一起的甜甜圈，非常有趣；而数字4让他联想到不太喜欢的酸柠檬。于是，小杨想出了一个好玩的游戏规则:把任意一个数字中所有的数字4都替换成8,如果数字中没有4,就保持原样不变。默认小猫角色和白色背景,请你编写一个程序,帮助小杨完成这个有趣的数字替换游戏吧!最后输出的答案存入变量ans中。",
                    inputDesc: "新建变量'A'，表示小杨要处理的数字。注意: 0<A≤100,000,000 (数字最长不超过9位)。",
                    outputDesc: "新建变量'ans'用于存储最后的结果。",
                    sampleInput: "A = 8459045",
                    sampleOutput: "ans = 8859085",
                    referenceCode: `当绿旗被点击

将ans设为0
将k设为1

  将d设为(A除以10的余数)
  如果d=4那么
    将d设为8
  将ans设为(ans)+(d*k)
  将k设为(k*10)
  将A设为向下取整(A/10)`
                }
            ]
        };

        // 当前显示的题目索引
        let currentSingleIndex = 0;
        let currentJudgmentIndex = 0;
        let currentProgrammingIndex = 0;

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            renderSingleChoiceQuestions();
            renderJudgmentQuestions();
            renderProgrammingQuestions();
            setupEventListeners();
            updateNavigation();
        });

        // 渲染单选题
        function renderSingleChoiceQuestions() {
            const container = document.getElementById('single-choice-questions');
            container.innerHTML = '';
            
            examData.singleChoice.forEach((q, index) => {
                const questionElement = document.createElement('div');
                questionElement.className = 'question';
                questionElement.id = `single-q${index}`;
                questionElement.style.display = index === currentSingleIndex ? 'block' : 'none';
                
                let optionsHtml = '';
                q.options.forEach((option, optIndex) => {
                    const optionLetter = String.fromCharCode(65 + optIndex);
                    const isSelected = q.userAnswer === optionLetter;
                    optionsHtml += `
                        <div class="option ${isSelected ? 'selected' : ''}" data-answer="${optionLetter}">
                            ${option}
                        </div>
                    `;
                });
                
                questionElement.innerHTML = `
                    <div class="question-header">
                        <div class="question-number">第${q.number}题</div>
                        <div class="question-score">3分</div>
                    </div>
                    <div class="question-text">${q.question}</div>
                    <div class="options">${optionsHtml}</div>
                    <div class="answer-display ${q.userAnswer !== null ? 'correct-answer' : ''}" 
                         style="${q.userAnswer !== null ? 'display:block' : ''}">
                        正确答案: ${q.correctAnswer}<br>
                        ${q.explanation}
                    </div>
                `;
                
                container.appendChild(questionElement);
            });
            
            document.getElementById('single-total').textContent = examData.singleChoice.length;
            updateSingleCurrent();
        }

        // 渲染判断题
        function renderJudgmentQuestions() {
            const container = document.getElementById('judgment-questions');
            container.innerHTML = '';
            
            examData.judgment.forEach((q, index) => {
                const questionElement = document.createElement('div');
                questionElement.className = 'question';
                questionElement.id = `judgment-q${index}`;
                questionElement.style.display = index === currentJudgmentIndex ? 'block' : 'none';
                
                const isTrueSelected = q.userAnswer === true;
                const isFalseSelected = q.userAnswer === false;
                
                questionElement.innerHTML = `
                    <div class="question-header">
                        <div class="question-number">第${q.number}题</div>
                        <div class="question-score">4分</div>
                    </div>
                    <div class="question-text">${q.question}</div>
                    <div class="judgment-options">
                        <button class="judgment-btn ${isTrueSelected ? 'selected' : ''}" data-answer="true">正确 (√)</button>
                        <button class="judgment-btn ${isFalseSelected ? 'selected' : ''}" data-answer="false">错误 (×)</button>
                    </div>
                    <div class="answer-display ${q.userAnswer !== null ? 'correct-answer' : ''}" 
                         style="${q.userAnswer !== null ? 'display:block' : ''}">
                        正确答案: ${q.correctAnswer ? '正确 (√)' : '错误 (×)'}<br>
                        ${q.explanation}
                    </div>
                `;
                
                container.appendChild(questionElement);
            });
            
            document.getElementById('judgment-total').textContent = examData.judgment.length;
            updateJudgmentCurrent();
        }

        // 渲染编程题
        function renderProgrammingQuestions() {
            const container = document.getElementById('programming-questions');
            container.innerHTML = '';
            
            examData.programming.forEach((q, index) => {
                const questionElement = document.createElement('div');
                questionElement.className = 'programming-question';
                questionElement.id = `programming-q${index}`;
                questionElement.style.display = index === currentProgrammingIndex ? 'block' : 'none';
                
                questionElement.innerHTML = `
                    <div class="question-header">
                        <div class="question-number">第${q.number}题</div>
                        <div class="question-score">25分</div>
                    </div>
                    <h3>${q.title}</h3>
                    <div class="problem-description">${q.description}</div>
                    
                    <div class="input-output">
                        <div class="io-box">
                            <div class="io-title">输入描述</div>
                            <p>${q.inputDesc}</p>
                            <div class="io-title">输入样例</div>
                            <div class="sample-box">${q.sampleInput}</div>
                        </div>
                        
                        <div class="io-box">
                            <div class="io-title">输出描述</div>
                            <p>${q.outputDesc}</p>
                            <div class="io-title">输出样例</div>
                            <div class="sample-box">${q.sampleOutput}</div>
                        </div>
                    </div>
                    
                    <div class="io-title">参考程序</div>
                    <div class="reference-code">${q.referenceCode}</div>
                `;
                
                container.appendChild(questionElement);
            });
            
            document.getElementById('programming-total').textContent = examData.programming.length;
            updateProgrammingCurrent();
        }

        // 设置事件监听器
        function setupEventListeners() {
            // 选项卡切换
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const targetId = this.getAttribute('data-target');
                    
                    // 更新活动选项卡
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    // 显示对应的内容区域
                    document.querySelectorAll('.content-section').forEach(section => {
                        section.classList.remove('active');
                    });
                    document.getElementById(targetId).classList.add('active');
                });
            });
            
            // 单选题选项点击
            document.getElementById('single-choice-questions').addEventListener('click', function(e) {
                if (e.target.classList.contains('option')) {
                    const questionIndex = currentSingleIndex;
                    const selectedAnswer = e.target.getAttribute('data-answer');
                    
                    // 更新用户答案
                    examData.singleChoice[questionIndex].userAnswer = selectedAnswer;
                    
                    // 更新UI
                    const questionElement = document.getElementById(`single-q${questionIndex}`);
                    questionElement.querySelectorAll('.option').forEach(opt => {
                        opt.classList.remove('selected');
                    });
                    e.target.classList.add('selected');
                    
                    // 显示正确答案和解析
                    const answerDisplay = questionElement.querySelector('.answer-display');
                    answerDisplay.style.display = 'block';
                    answerDisplay.textContent = `正确答案: ${examData.singleChoice[questionIndex].correctAnswer}\n${examData.singleChoice[questionIndex].explanation}`;
                }
            });
            
            // 判断题选项点击
            document.getElementById('judgment-questions').addEventListener('click', function(e) {
                if (e.target.classList.contains('judgment-btn')) {
                    const questionIndex = currentJudgmentIndex;
                    const selectedAnswer = e.target.getAttribute('data-answer') === 'true';
                    
                    // 更新用户答案
                    examData.judgment[questionIndex].userAnswer = selectedAnswer;
                    
                    // 更新UI
                    const questionElement = document.getElementById(`judgment-q${questionIndex}`);
                    questionElement.querySelectorAll('.judgment-btn').forEach(btn => {
                        btn.classList.remove('selected');
                    });
                    e.target.classList.add('selected');
                    
                    // 显示正确答案和解析
                    const answerDisplay = questionElement.querySelector('.answer-display');
                    answerDisplay.style.display = 'block';
                    const correctText = examData.judgment[questionIndex].correctAnswer ? '正确 (√)' : '错误 (×)';
                    answerDisplay.textContent = `正确答案: ${correctText}\n${examData.judgment[questionIndex].explanation}`;
                }
            });
            
            // 单选题导航
            document.getElementById('prev-single').addEventListener('click', function() {
                if (currentSingleIndex > 0) {
                    currentSingleIndex--;
                    showQuestion('single', currentSingleIndex);
                    updateSingleCurrent();
                }
            });
            
            document.getElementById('next-single').addEventListener('click', function() {
                if (currentSingleIndex < examData.singleChoice.length - 1) {
                    currentSingleIndex++;
                    showQuestion('single', currentSingleIndex);
                    updateSingleCurrent();
                }
            });
            
            // 判断题导航
            document.getElementById('prev-judgment').addEventListener('click', function() {
                if (currentJudgmentIndex > 0) {
                    currentJudgmentIndex--;
                    showQuestion('judgment', currentJudgmentIndex);
                    updateJudgmentCurrent();
                }
            });
            
            document.getElementById('next-judgment').addEventListener('click', function() {
                if (currentJudgmentIndex < examData.judgment.length - 1) {
                    currentJudgmentIndex++;
                    showQuestion('judgment', currentJudgmentIndex);
                    updateJudgmentCurrent();
                }
            });
            
            // 编程题导航
            document.getElementById('prev-programming').addEventListener('click', function() {
                if (currentProgrammingIndex > 0) {
                    currentProgrammingIndex--;
                    showQuestion('programming', currentProgrammingIndex);
                    updateProgrammingCurrent();
                }
            });
            
            document.getElementById('next-programming').addEventListener('click', function() {
                if (currentProgrammingIndex < examData.programming.length - 1) {
                    currentProgrammingIndex++;
                    showQuestion('programming', currentProgrammingIndex);
                    updateProgrammingCurrent();
                }
            });
            
            // 提交所有答案
            document.getElementById('submit-all').addEventListener('click', function() {
                calculateScore();
                showResultsSummary();
                document.querySelector('.tab-btn[data-target="results"]').click();
            });
            
            // 重置答案
            document.getElementById('reset-answers').addEventListener('click', function() {
                if (confirm('确定要重置所有答案吗？这将清除您已做的所有题目答案。')) {
                    resetAnswers();
                }
            });
        }

        // 显示指定类型的题目
        function showQuestion(type, index) {
            if (type === 'single') {
                document.querySelectorAll('#single-choice-questions .question').forEach((q, i) => {
                    q.style.display = i === index ? 'block' : 'none';
                });
            } else if (type === 'judgment') {
                document.querySelectorAll('#judgment-questions .question').forEach((q, i) => {
                    q.style.display = i === index ? 'block' : 'none';
                });
            } else if (type === 'programming') {
                document.querySelectorAll('#programming-questions .programming-question').forEach((q, i) => {
                    q.style.display = i === index ? 'block' : 'none';
                });
            }
        }

        // 更新单选题当前题号显示
        function updateSingleCurrent() {
            document.getElementById('single-current').textContent = currentSingleIndex + 1;
        }

        // 更新判断题当前题号显示
        function updateJudgmentCurrent() {
            document.getElementById('judgment-current').textContent = currentJudgmentIndex + 1;
        }

        // 更新编程题当前题号显示
        function updateProgrammingCurrent() {
            document.getElementById('programming-current').textContent = currentProgrammingIndex + 1;
        }

        // 更新导航状态
        function updateNavigation() {
            // 单选题导航按钮状态
            document.getElementById('prev-single').disabled = currentSingleIndex === 0;
            document.getElementById('next-single').disabled = currentSingleIndex === examData.singleChoice.length - 1;
            
            // 判断题导航按钮状态
            document.getElementById('prev-judgment').disabled = currentJudgmentIndex === 0;
            document.getElementById('next-judgment').disabled = currentJudgmentIndex === examData.judgment.length - 1;
            
            // 编程题导航按钮状态
            document.getElementById('prev-programming').disabled = currentProgrammingIndex === 0;
            document.getElementById('next-programming').disabled = currentProgrammingIndex === examData.programming.length - 1;
        }

        // 计算分数
        function calculateScore() {
            let totalScore = 0;
            let singleScore = 0;
            let judgmentScore = 0;
            
            // 计算单选题分数
            examData.singleChoice.forEach(q => {
                if (q.userAnswer === q.correctAnswer) {
                    singleScore += 3;
                }
            });
            
            // 计算判断题分数
            examData.judgment.forEach(q => {
                if (q.userAnswer === q.correctAnswer) {
                    judgmentScore += 4;
                }
            });
            
            // 编程题默认给满分（模拟系统）
            const programmingScore = 50;
            
            totalScore = singleScore + judgmentScore + programmingScore;
            
            // 显示总分
            document.getElementById('score-value').textContent = totalScore;
            document.getElementById('total-score').style.display = 'block';
            
            return totalScore;
        }

        // 显示答题摘要
        function showResultsSummary() {
            const container = document.getElementById('results-summary');
            let html = '<h3>答题情况摘要</h3>';
            
            // 单选题答题情况
            html += '<div class="question"><div class="question-header"><div class="question-number">单选题答题情况</div></div>';
            examData.singleChoice.forEach(q => {
                const isCorrect = q.userAnswer === q.correctAnswer;
                html += `<p>第${q.number}题: ${q.userAnswer ? `选择了${q.userAnswer}` : '未作答'} - ${isCorrect ? '✓ 正确' : '✗ 错误'} (正确答案: ${q.correctAnswer})</p>`;
            });
            html += '</div>';
            
            // 判断题答题情况
            html += '<div class="question"><div class="question-header"><div class="question-number">判断题答题情况</div></div>';
            examData.judgment.forEach(q => {
                const isCorrect = q.userAnswer === q.correctAnswer;
                const userAnswerText = q.userAnswer !== null ? (q.userAnswer ? '正确 (√)' : '错误 (×)') : '未作答';
                const correctAnswerText = q.correctAnswer ? '正确 (√)' : '错误 (×)';
                html += `<p>第${q.number}题: ${userAnswerText} - ${isCorrect ? '✓ 正确' : '✗ 错误'} (正确答案: ${correctAnswerText})</p>`;
            });
            html += '</div>';
            
            // 编程题答题情况
            html += '<div class="question"><div class="question-header"><div class="question-number">编程题答题情况</div></div>';
            html += '<p>编程题已根据参考答案自动评分，两道编程题各得25分。</p>';
            html += '</div>';
            
            container.innerHTML = html;
        }

        // 重置所有答案
        function resetAnswers() {
            // 重置单选题答案
            examData.singleChoice.forEach(q => {
                q.userAnswer = null;
            });
            
            // 重置判断题答案
            examData.judgment.forEach(q => {
                q.userAnswer = null;
            });
            
            // 重置当前索引
            currentSingleIndex = 0;
            currentJudgmentIndex = 0;
            currentProgrammingIndex = 0;
            
            // 重新渲染
            renderSingleChoiceQuestions();
            renderJudgmentQuestions();
            renderProgrammingQuestions();
            updateNavigation();
            
            // 隐藏分数显示
            document.getElementById('total-score').style.display = 'none';
            document.getElementById('results-summary').innerHTML = '';
            
            alert('所有答案已重置！');
        }
    </script>
</body>
</html>
